name: Minecraft Mod Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.5 # Forge 1.20.1 ile tam uyumlu kararlı sürüm

    - name: Build with Gradle
      run: gradle build

    - name: Upload Mod Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KarmaMod-Jar-Dosyasi
        path: build/libs/*.jar
        
